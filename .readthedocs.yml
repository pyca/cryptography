# https://docs.readthedocs.com/platform/stable/config-file/v2.html

version: 2

sphinx:
  # The config file overrides the UI settings:
  # https://github.com/pyca/cryptography/issues/5863#issuecomment-817828152
  builder: dirhtml
  configuration: docs/conf.py

formats:
  - pdf

build:
  os: "ubuntu-26.04"
  tools:
    python: "3.14"
    rust: "latest"

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs
