name: Lock Issues
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  lock:
    if: github.repository_owner == 'pyca'
    runs-on: ubuntu-latest
    permissions:
      issues: "write"

    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: 90
          pr-inactive-days: 90
