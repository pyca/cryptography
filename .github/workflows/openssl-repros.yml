name: OpenSSL PPC64 reproducers

on:
  push:
    branches: [bump-repros]
  workflow_dispatch:

jobs:
  repros:
    runs-on: ${{ matrix.arch.runner }}
    container: ${{ matrix.arch.container }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - runner: ubuntu-latest
            container: ghcr.io/pyca/cryptography-runner-ubuntu-rolling
            name: x86_64
          - runner: ubuntu-24.04-ppc64le
            container: ghcr.io/pyca/cryptography-runner-ubuntu-rolling:ppc64le
            name: ppc64le
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 3
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: apt-get update && apt-get install -y gcc make perl

      - name: Build OpenSSL from source (with debug prints)
        run: |
          git clone --depth 1 https://github.com/openssl/openssl.git /tmp/openssl-src
          cd /tmp/openssl-src
          # Patch ppc_aes_gcm_crypt to add debug output
          sed -i '/int s = 0;/a\    fprintf(stderr, "DEBUG ppc_aes_gcm_crypt: len=%zu encrypt=%d\\n", len, encrypt);' \
            providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          sed -i '/ndone += s;/i\        fprintf(stderr, "DEBUG ppc_aes_gcm_crypt: s=%d ndone=%d len=%zu\\n", s, ndone, len);' \
            providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          # Patch ppc_aes_gcm_cipher_update to show if assembly path taken
          sed -i '/bulk = ppc_aes_gcm_crypt/i\                fprintf(stderr, "DEBUG cipher_update: TAKING PPC ASM PATH, len=%zu res=%zu\\n", len, res);' \
            providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          sed -i '/ctx->gcm.len.u\[1\] += bulk;/i\                fprintf(stderr, "DEBUG cipher_update: bulk=%zu (0x%zx)\\n", bulk, bulk);' \
            providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          # Add stdio.h include
          sed -i '1i #include <stdio.h>' providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          echo "--- Patched file ---"
          head -60 providers/implementations/ciphers/cipher_aes_gcm_hw_ppc.inc
          ./config --prefix=/tmp/openssl-install --libdir=lib shared -O2
          make -j"$(nproc)"
          make install_sw

      - name: Build reproducer
        run: |
          CFLAGS="-I/tmp/openssl-install/include -O2 -Wall"
          LDFLAGS="-L/tmp/openssl-install/lib -Wl,-rpath,/tmp/openssl-install/lib"
          gcc $CFLAGS -o repro_gcm repros/gcm_crypt.c $LDFLAGS -lcrypto

      - name: Show CPU info and OpenSSL diagnostics
        run: |
          uname -m
          cat /proc/cpuinfo | head -30 || true
          echo "--- OpenSSL GCM symbols (dynamic) ---"
          nm -D /tmp/openssl-install/lib/libcrypto.so | grep -i "ppc_aes_gcm\|gcm_ghash_p8\|aes_p8_ctr32" || echo "No dynamic PPC GCM symbols found"
          echo "--- OpenSSL GCM symbols (all) ---"
          nm /tmp/openssl-install/lib/libcrypto.so | grep -i "ppc_aes_gcm\|gcm_ghash_p8\|aes_p8_ctr32" || echo "No PPC GCM symbols at all"
          echo "--- Check aes-gcm-ppc assembly ---"
          ls -la /tmp/openssl-src/crypto/modes/aes-gcm-ppc* 2>/dev/null || echo "No aes-gcm-ppc assembly files"
          echo "--- Disassemble ppc_aes_gcm_cipher_update ---"
          objdump -d /tmp/openssl-install/lib/libcrypto.so 2>/dev/null | awk '/<ppc_aes_gcm_cipher_update>:/{found=1} found{print; if(/^$/ && found>1)exit; found++}' | head -200 || true
          echo "--- HWCAP ---"
          LD_SHOW_AUXV=1 /tmp/openssl-install/bin/openssl version 2>&1 | grep -i "hwcap\|platform" || true
          echo "--- OpenSSL version ---"
          /tmp/openssl-install/bin/openssl version -a || true

      - name: "Run: AES-GCM int overflow via EVP_Cipher"
        continue-on-error: true
        run: ./repro_gcm 2>&1
