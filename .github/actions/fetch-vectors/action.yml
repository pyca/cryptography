name: Clone test vectors
description: Clones the wycheproof and x509-limbo repositories

runs:
  using: "composite"

  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: "C2SP/wycheproof"
        path: "wycheproof"
        # Latest commit on the wycheproof main branch, as of Jun 07, 2026.
        ref: "6d7cccd0fcb1917368579adeeac10fe802f1b521" # wycheproof-ref
        persist-credentials: false

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: "C2SP/x509-limbo"
        path: "x509-limbo"
        # Latest commit on the x509-limbo main branch, as of Jun 16, 2026.
        ref: "9d41359a05d811ee3de8026ff21d7ddecbd0f3eb" # x509-limbo-ref
        persist-credentials: false
